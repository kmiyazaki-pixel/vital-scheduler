version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vital_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/vital_scheduler
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
