spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/vital_scheduler}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        name: VITAL_SCHEDULER_SESSION
        same-site: none
        secure: true
        http-only: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
